<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WASM SIMD Death Sweep Benchmark</title>
<style>
  body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  h1 { color: #00d4aa; }
  pre { background: #16213e; padding: 12px; border-radius: 6px; overflow-x: auto; }
  #output { white-space: pre-wrap; font-size: 13px; }
  #status { margin: 12px 0; padding: 8px; border-radius: 4px; font-weight: bold; }
  .running { background: #2d4a3e; color: #7dffb3; }
  .done    { background: #1a3a2e; color: #00d4aa; }
  .error   { background: #4a1a1a; color: #ff7d7d; }
  .nosimd  { background: #4a4a1a; color: #ffff7d; }
  button   { background: #00d4aa; color: #1a1a2e; border: none; padding: 10px 24px;
             font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
  button:hover { background: #00ffc8; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
  <h1>WASM SIMD Death Sweep Benchmark</h1>
  <p>Compares JS vs WASM SIMD128 death sweep across particle counts and death rates.</p>
  <div id="status" class="">⏳ Initializing...</div>
  <button id="runBtn" onclick="run()">Run Benchmark</button>
  <h2>Output</h2>
  <pre id="output">Click "Run Benchmark" to start.</pre>
  <script type="module">
    import { runBenchmark } from "./death_sweep_simd_benchmark.js";
    const output = document.getElementById("output");
    const status = document.getElementById("status");

    // Detect SIMD support
    let simdSupported = false;
    try {
      const mem = new WebAssembly.Memory({ initial: 1 });
      const simdTest = new Uint8Array([
        0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00,  // magic + version
        0x01, 0x05, 0x01, 0x60, 0x00, 0x01, 0x7b,        // type: () -> v128
        0x03, 0x02, 0x01, 0x00,                            // func: 0
        0x0a, 0x0a, 0x01, 0x08, 0x00, 0x41, 0x00, 0xfd, 0x0f, 0xfd, 0x0b, 0x0b
        // body: i32.const 0; f32x4.splat; return
      ]);
      WebAssembly.instantiate(simdTest, { env: { memory: mem } });
      simdSupported = true;
    } catch (e) {
      simdSupported = false;
    }

    if (!simdSupported) {
      status.textContent = "⚠ SIMD128 not supported in this browser";
      status.className = "nosimd";
    }

    const origLog = console.log;
    console.log = function(...args) {
      const msg = args.map(a =>
        typeof a === "object" ? JSON.stringify(a, null, 2) : String(a)
      ).join(" ");
      output.textContent += msg + "\n";
      origLog.apply(console, args);
    };

    window.run = async function() {
      const btn = document.getElementById("runBtn");
      btn.disabled = true;
      output.textContent = "";
      status.textContent = "⏳ Running benchmark...";
      status.className = "running";
      try {
        await runBenchmark({});
        status.className = "done";
        status.textContent = "✓ Benchmark complete";
      } catch (e) {
        status.className = "error";
        status.textContent = "✗ Error: " + e.message;
        console.log("ERROR:", e);
      }
      btn.disabled = false;
    };

    status.textContent = simdSupported
      ? "Ready — SIMD128 detected, click 'Run Benchmark' to start"
      : "Ready — click 'Run Benchmark' to start (SIMD128 not detected)";
  </script>
</body>
</html>
