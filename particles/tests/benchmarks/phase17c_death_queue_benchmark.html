<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phase 17C — Death Queue Benchmark</title>
<style>
  body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  h1 { color: #00d4aa; }
  h2 { color: #00b4d8; }
  pre { background: #16213e; padding: 12px; border-radius: 6px; overflow-x: auto; }
  #output { white-space: pre-wrap; }
  #status { margin: 12px 0; padding: 8px; border-radius: 4px; font-weight: bold; }
  .running { background: #2d4a3e; color: #7dffb3; }
  .done   { background: #1a3a2e; color: #00d4aa; }
  .error  { background: #4a1a1a; color: #ff7d7d; }
  .skip   { background: #3a3a1a; color: #d4d400; }
  button { background: #00d4aa; color: #1a1a2e; border: none; padding: 10px 24px;
           font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
  button:hover { background: #00ffc8; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  table { border-collapse: collapse; margin: 16px 0; width: 100%; }
  th, td { border: 1px solid #444; padding: 8px 14px; text-align: right; }
  th { background: #16213e; text-align: center; font-weight: bold; color: #00b4d8; }
  td:first-child, th:first-child { text-align: left; }
</style>
</head>
<body>
  <h1>Phase 17C — Death Queue Benchmark</h1>
  <p>Compares CPU death sweep cost vs simulated GPU death queue cost at multiple scales.</p>
  <div id="status" class="running">📊 Initializing...</div>
  <button id="runBtn" onclick="run()">Run Benchmark</button>
  <h2>Console Log</h2>
  <pre id="output">Click "Run Benchmark" to start.</pre>
  <script type="module">
    import { runBenchmark } from "./phase17c_death_queue_benchmark.js";
    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const origLog = console.log;
    console.log = function(...args) {
      const msg = args.map(a => typeof a === "object" ? JSON.stringify(a, null, 2) : String(a)).join(" ");
      output.textContent += msg + "\n";
      origLog.apply(console, args);
    };
    window.run = async function() {
      const btn = document.getElementById("runBtn");
      btn.disabled = true;
      output.textContent = "";
      status.className = "running";
      status.textContent = "📊 Running benchmark...";
      try {
        await runBenchmark({});
        status.className = "done";
        status.textContent = "✓ Benchmark complete";
      } catch (e) {
        status.className = "error";
        status.textContent = "✗ Error: " + e.message;
        console.log("ERROR:", e);
      }
      btn.disabled = false;
    };
    status.textContent = "Ready — click 'Run Benchmark' to start";
    status.className = "";
  </script>
</body>
</html>
